<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fleet Alert</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: .9rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .02em; }
    #atualizado { font-size: .75rem; color: #64748b; }

    .container { padding: 1.25rem 1.5rem; max-width: 1080px; margin: 0 auto; }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      transition: opacity .2s;
    }
    .card.inativo { opacity: .45; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .85rem;
    }
    .card-nome { font-size: 1.05rem; font-weight: 700; }

    .badge {
      font-size: .68rem;
      font-weight: 700;
      padding: .2rem .55rem;
      border-radius: 999px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .b-off    { background: #450a0a; color: #fca5a5; }
    .b-parado { background: #451a03; color: #fdba74; }
    .b-move   { background: #052e16; color: #86efac; }
    .b-nd     { background: #1e293b; color: #64748b; border: 1px solid #334155; }

    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: .8rem;
      padding: .28rem 0;
      border-bottom: 1px solid #0f172a;
    }
    .info-row:last-of-type { border-bottom: none; }
    .info-label { color: #64748b; }
    .info-val   { color: #cbd5e1; text-align: right; max-width: 65%; word-break: break-word; }

    .btn-toggle {
      margin-top: .85rem;
      width: 100%;
      padding: .4rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      font-size: .78rem;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-toggle:hover { background: #1e293b; color: #e2e8f0; }

    /* ── Logs ── */
    .logs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .6rem;
    }
    .logs-header h2 { font-size: .95rem; font-weight: 600; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .78rem; }
    th {
      text-align: left;
      padding: .45rem .6rem;
      background: #1e293b;
      color: #64748b;
      font-weight: 500;
      border-bottom: 1px solid #334155;
    }
    td { padding: .4rem .6rem; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
    tr:hover td { background: #1e293b55; }

    .tipo-LIGADO_PARADO { color: #fdba74; font-weight: 600; }
    .tipo-EM_MOVIMENTO  { color: #86efac; font-weight: 600; }
    .tipo-DESLIGADO     { color: #fca5a5; font-weight: 600; }
    .tipo-ENVIO         { color: #64748b; }
    .tipo-POSICAO       { color: #334155; }

    .config-section { margin-top: 2rem; }
    .config-section h2 { font-size: .95rem; font-weight: 600; margin-bottom: .75rem; }
    .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: .85rem; }
    .config-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1rem 1.1rem; }
    .config-label { font-size: .75rem; color: #64748b; margin-bottom: .3rem; }
    .config-nome { font-size: .9rem; font-weight: 600; color: #f1f5f9; margin-bottom: .6rem; }
    .config-input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: .8rem; padding: .4rem .6rem; margin-bottom: .5rem; }
    .config-input:focus { outline: none; border-color: #475569; }
    .btn-salvar { width: 100%; padding: .4rem; background: #1d4ed8; border: none; border-radius: 8px; color: #fff; font-size: .78rem; cursor: pointer; }
    .btn-salvar:hover { background: #2563eb; }
    .msg-ok  { font-size: .72rem; color: #86efac; margin-top: .3rem; display: none; }
    .msg-err { font-size: .72rem; color: #fca5a5; margin-top: .3rem; display: none; }
  </style>
</head>
<body>

<header>
  <h1>Fleet Alert</h1>
  <span id="atualizado">Carregando...</span>
</header>

<div class="container">
  <div class="cards" id="cards"></div>

  <div class="logs-header">
    <h2>Últimos eventos</h2>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Horário</th>
          <th>Veículo</th>
          <th>Tipo</th>
          <th>Detalhe</th>
        </tr>
      </thead>
      <tbody id="logs-body"></tbody>
    </table>
  </div>

  <div class="config-section">
    <h2>Configuração de grupos</h2>
    <div class="config-grid" id="config-grid"></div>
  </div>
</div>

<script>
  function badgeInfo(v) {
    if (v.ignition === null || v.ignition === undefined)
      return ['b-nd', 'Sem dados'];
    if (v.ignition === 0)
      return ['b-off', 'Desligado'];
    if (v.motion === 1 || (v.speed && v.speed > 2))
      return ['b-move', 'Em movimento'];
    return ['b-parado', 'Ligado / Parado'];
  }

  function fmt(val, suffix = '') {
    return val != null ? val + suffix : '—';
  }

  function renderCards(lista) {
    document.getElementById('cards').innerHTML = lista.map(v => {
      const [cls, label] = badgeInfo(v);
      return `
        <div class="card ${v.ativo ? '' : 'inativo'}">
          <div class="card-top">
            <span class="card-nome">${v.nome}</span>
            <span class="badge ${cls}">${label}</span>
          </div>
          <div class="info-row"><span class="info-label">Endereço</span><span class="info-val">${v.address || '—'}</span></div>
          <div class="info-row"><span class="info-label">Velocidade</span><span class="info-val">${fmt(v.speed, ' km/h')}</span></div>
          <div class="info-row"><span class="info-label">Hodômetro</span><span class="info-val">${fmt(v.odometer, ' km')}</span></div>
          <div class="info-row"><span class="info-label">Bateria</span><span class="info-val">${fmt(v.batteryLevel, '%')}</span></div>
          <div class="info-row"><span class="info-label">Ligou às</span><span class="info-val">${v.hora_ligou || '—'}</span></div>
          <div class="info-row"><span class="info-label">Último alerta</span><span class="info-val">${v.ultimo_alerta || '—'}</span></div>
          <button class="btn-toggle" onclick="toggle('${v.nome}')">
            ${v.ativo ? '⏸ Pausar alertas' : '▶ Ativar alertas'}
          </button>
        </div>`;
    }).join('');
  }

  function renderLogs(logs) {
    document.getElementById('logs-body').innerHTML = logs.slice(0, 60).map(l => {
      const ts = l.ts.replace('T', ' ').slice(0, 19);
      const det = (l.detalhe || '').slice(0, 90);
      return `
        <tr>
          <td>${ts}</td>
          <td>${l.veiculo}</td>
          <td class="tipo-${l.tipo}">${l.tipo}</td>
          <td>${det}</td>
        </tr>`;
    }).join('');
  }

  function renderConfig(lista) {
    document.getElementById('config-grid').innerHTML = lista.map(v => `
      <div class="config-card">
        <div class="config-nome">${v.nome}</div>
        <div class="config-label">ID do grupo WhatsApp</div>
        <input class="config-input" id="grupo-${v.nome}" value="${v.grupo_id || ''}" placeholder="120363...@g.us" />
        <button class="btn-salvar" onclick="salvarConfig('${v.nome}')">Salvar grupo</button>
        <div class="msg-ok"  id="ok-${v.nome}">✓ Salvo com sucesso</div>
        <div class="msg-err" id="err-${v.nome}">✗ Erro ao salvar</div>
      </div>`).join('');
  }

  async function salvarConfig(nome) {
    const grupo_id = document.getElementById(`grupo-${nome}`).value.trim();
    const okEl  = document.getElementById(`ok-${nome}`);
    const errEl = document.getElementById(`err-${nome}`);
    okEl.style.display = errEl.style.display = 'none';
    try {
      const r = await fetch(`/api/config/veiculo/${nome}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ grupo_id }),
      });
      if (r.ok) { okEl.style.display = 'block'; setTimeout(() => okEl.style.display = 'none', 3000); }
      else       { errEl.style.display = 'block'; }
    } catch { errEl.style.display = 'block'; }
  }

  async function toggle(nome) {
    await fetch(`/api/toggle/${nome}`, { method: 'POST' });
    await atualizar();
  }

  async function atualizar() {
    try {
      const [veiculos, logs] = await Promise.all([
        fetch('/api/veiculos').then(r => r.json()),
        fetch('/api/logs').then(r => r.json()),
      ]);
      renderCards(veiculos);
      renderLogs(logs);
      renderConfig(veiculos);
      document.getElementById('atualizado').textContent =
        'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
    } catch (e) {
      document.getElementById('atualizado').textContent = 'Erro ao conectar';
    }
  }

  atualizar();
  setInterval(atualizar, 5000);
</script>
</body>
</html>
