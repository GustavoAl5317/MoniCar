<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fleet Alert — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem 2.25rem;
      width: 100%;
      max-width: 360px;
    }
    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: .4rem;
    }
    .sub {
      font-size: .8rem;
      color: #64748b;
      margin-bottom: 1.75rem;
    }
    label {
      display: block;
      font-size: .78rem;
      color: #94a3b8;
      margin-bottom: .35rem;
    }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: .9rem;
      padding: .55rem .75rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #475569; }
    button {
      width: 100%;
      padding: .6rem;
      background: #1d4ed8;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #2563eb; }
    .erro {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: .5rem .75rem;
      font-size: .8rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Fleet Alert</div>
    <div class="sub">Monitoramento de frota</div>

    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}

    <form method="POST">
      <label for="usuario">Usuário</label>
      <input type="text" id="usuario" name="usuario" autocomplete="username" required autofocus>

      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" autocomplete="current-password" required>

      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
